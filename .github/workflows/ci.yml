name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore src/DungeonTracker/DungeonTracker.csproj

      - name: Build
        run: >
          dotnet build src/DungeonTracker/DungeonTracker.csproj
          -c Release
          --no-restore
          -p:DeployOnBuild=false
